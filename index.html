<style>
  :root{
    --black:#0D0D0D; --panel:#1c1c1c; --panel2:#161616;
    --red:#FF4D00; --orange:#FFA21A; --white:#FFFFFF; --gray:#6B6B6B; --lg:#a3a3a3;
    --ok:#22c55e; --err:#ff4d4d;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'Tajawal','Poppins',sans-serif;min-height:100vh;}
  html[dir="ltr"] body{font-family:'Poppins','Tajawal',sans-serif;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select{font-family:inherit;}
  .hidden{display:none !important;}

  header{position:sticky;top:0;z-index:100;background:rgba(13,13,13,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 5%;max-width:1300px;margin:0 auto;gap:16px;}
  .logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--red),var(--orange));clip-path:polygon(0 0,30% 0,50% 55%,70% 0,100% 0,55% 100%,45% 100%);}
  .logo-text{font-family:'Poppins',sans-serif;font-weight:800;font-size:19px;letter-spacing:1px;}
  .navlinks{display:flex;gap:20px;font-size:13px;color:var(--lg);}
  .navlinks button:hover{color:var(--orange);}
  .top-actions{display:flex;align-items:center;gap:14px;}
  .lang-switch{display:flex;border:1px solid rgba(255,255,255,.15);border-radius:20px;overflow:hidden;font-size:11px;}
  .lang-switch button{padding:6px 12px;font-weight:600;color:var(--gray);}
  .lang-switch button.active{background:linear-gradient(90deg,var(--red),var(--orange));color:var(--white);}
  .currency-select{background:var(--panel);color:var(--white);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 10px;font-size:11px;outline:none;cursor:pointer;}
  .icon-btn{width:20px;height:20px;stroke:var(--white);position:relative;}
  .cart-btn{position:relative;display:flex;align-items:center;}
  .cart-count{position:absolute;top:-8px;inset-inline-start:-9px;background:var(--red);font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

  main{max-width:1300px;margin:0 auto;padding:0 5%;}

  /* HERO */
  .hero{padding:60px 0 70px;display:flex;align-items:center;gap:50px;}
  .hero-copy{flex:1;}
  .eyebrow{color:var(--orange);font-size:12px;letter-spacing:3px;font-weight:600;margin-bottom:16px;font-family:'Poppins',sans-serif;}
  .hero h1{font-size:42px;font-weight:800;line-height:1.2;margin-bottom:16px;}
  .hero h1 span{background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{color:var(--lg);font-size:14.5px;max-width:440px;line-height:1.8;margin-bottom:26px;}
  .btn-primary{background:linear-gradient(90deg,var(--red),var(--orange));color:#fff;font-weight:700;padding:13px 28px;border-radius:8px;font-size:13.5px;}
  .hero-orb{width:220px;height:220px;border-radius:50%;flex-shrink:0;background:conic-gradient(from 200deg,#1a1a1a,#2a1105,var(--red),var(--orange),#2a1105,#1a1a1a);box-shadow:0 0 60px rgba(255,77,0,.25);}

  /* CATEGORY PILLS */
  .cat-pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px;}
  .cat-pill{padding:9px 18px;border-radius:20px;background:var(--panel);border:1px solid rgba(255,255,255,.08);font-size:12.5px;font-weight:600;color:var(--lg);}
  .cat-pill.active{background:linear-gradient(90deg,var(--red),var(--orange));color:#fff;border-color:transparent;}

  /* PRODUCTS */
  .section-title{font-size:22px;font-weight:800;margin-bottom:18px;}
  .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:60px;}
  .prod-card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;transition:.2s;cursor:pointer;}
  .prod-card:hover{border-color:rgba(255,77,0,.5);transform:translateY(-3px);}
  .prod-img{aspect-ratio:1/1;background:linear-gradient(135deg,#222,#151515);display:flex;align-items:center;justify-content:center;}
  .prod-img svg{width:42px;height:42px;stroke:var(--gray);}

  /* PRODUCT DETAIL MODAL */
  .product-box{max-width:640px;position:relative;}
  .pd-top{display:flex;gap:22px;margin-bottom:6px;}
  .pd-img{width:180px;height:180px;flex-shrink:0;border-radius:14px;background:linear-gradient(135deg,#222,#151515);display:flex;align-items:center;justify-content:center;}
  .pd-img svg{width:70px;height:70px;stroke:var(--gray);}
  .pd-info{flex:1;}
  .pd-cat-tag{display:inline-block;font-size:10.5px;color:var(--orange);background:rgba(255,162,26,.1);border:1px solid rgba(255,162,26,.3);padding:3px 10px;border-radius:20px;margin-bottom:8px;}
  .pd-name{font-size:18px;font-weight:800;margin-bottom:8px;}
  .pd-rating{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray);margin-bottom:10px;}
  .pd-rating .stars{color:var(--orange);letter-spacing:1px;}
  .pd-price{font-size:22px;font-weight:800;color:var(--orange);margin-bottom:14px;}
  .pd-qty-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .pd-qty-row .qty-row button{width:28px;height:28px;font-size:16px;}
  .pd-section-title{font-size:13px;font-weight:700;margin:20px 0 8px;color:var(--white);}
  .pd-desc{color:var(--lg);font-size:12.5px;line-height:1.9;}
  .pd-specs{width:100%;border-collapse:collapse;font-size:12px;}
  .pd-specs tr{border-bottom:1px solid rgba(255,255,255,.06);}
  .pd-specs td{padding:9px 4px;}
  .pd-specs td:first-child{color:var(--gray);width:40%;}
  .pd-specs td:last-child{color:var(--white);font-weight:500;}
  .close-x-abs{position:absolute;top:16px;inset-inline-end:16px;font-size:18px;color:var(--gray);width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;}

  /* ADMIN PANEL */
  .admin-box{max-width:600px;position:relative;}
  .admin-note{background:rgba(255,162,26,.08);border:1px solid rgba(255,162,26,.25);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--orange);margin-bottom:18px;line-height:1.7;}
  .admin-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ok);margin-bottom:14px;}
  .admin-list{margin-top:10px;}
  .admin-list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--panel);border-radius:8px;margin-bottom:8px;font-size:12px;}
  .admin-list-item span{color:var(--lg);}
  .admin-del-btn{color:var(--err);font-size:11px;font-weight:700;}
  .admin-empty{color:var(--gray);font-size:12px;text-align:center;padding:14px 0;}
  .admin-welcome{font-size:12.5px;color:var(--lg);margin-bottom:4px;}
  .role-badge{background:rgba(255,162,26,.15);color:var(--orange);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-inline-start:6px;}
  .admin-list-item em{color:var(--gray);font-style:normal;font-size:10.5px;}
  .admin-tabs{display:flex;gap:8px;margin:14px 0 20px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:0;}
  .admin-tab-btn{padding:9px 6px;font-size:12px;font-weight:600;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .admin-tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
  .sales-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .sales-card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;text-align:center;}
  .sales-card .val{font-size:18px;font-weight:800;color:var(--orange);font-family:'Poppins',sans-serif;}
  .sales-card .lbl{font-size:10.5px;color:var(--gray);margin-top:4px;}
  .order-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:11.5px;}
  .order-row .oid{font-family:'Poppins',sans-serif;color:var(--lg);}
  .prod-info{padding:14px;}
  .prod-info h4{font-size:13px;font-weight:600;margin-bottom:8px;min-height:36px;}
  .prod-price{color:var(--orange);font-weight:800;font-size:15px;margin-bottom:10px;}
  .add-btn{width:100%;padding:9px;border-radius:8px;background:rgba(255,77,0,.12);color:var(--orange);font-size:12px;font-weight:700;border:1px solid rgba(255,77,0,.3);}
  .add-btn:hover{background:linear-gradient(90deg,var(--red),var(--orange));color:#fff;}
  .add-btn.added{background:var(--ok);color:#fff;border-color:var(--ok);}

  /* CART DRAWER */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;}
  .drawer{position:fixed;top:0;bottom:0;inset-inline-end:0;width:400px;max-width:92vw;background:var(--panel2);z-index:201;display:flex;flex-direction:column;border-inline-start:1px solid rgba(255,255,255,.08);}
  .drawer-head{padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);}
  .drawer-head h3{font-size:17px;}
  .close-x{font-size:20px;color:var(--gray);}
  .drawer-body{flex:1;overflow-y:auto;padding:16px 20px;}
  .cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center;}
  .cart-item .thumb{width:52px;height:52px;background:var(--panel);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .cart-item .thumb svg{width:24px;height:24px;stroke:var(--gray);}
  .cart-item .info{flex:1;}
  .cart-item .info h5{font-size:12.5px;margin-bottom:6px;}
  .qty-row{display:flex;align-items:center;gap:10px;}
  .qty-row button{width:22px;height:22px;background:var(--panel);border-radius:6px;font-size:14px;}
  .cart-item .price{font-size:13px;font-weight:700;color:var(--orange);}
  .remove-btn{font-size:11px;color:var(--gray);margin-top:6px;}
  .empty-cart{text-align:center;color:var(--gray);padding:60px 0;font-size:13px;}
  .drawer-foot{padding:20px;border-top:1px solid rgba(255,255,255,.08);}
  .subtotal-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:14px;}
  .subtotal-row strong{color:var(--orange);font-size:17px;}

  /* CHECKOUT MODAL */
  .modal{position:fixed;inset:0;z-index:210;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--panel2);border-radius:16px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:28px;border:1px solid rgba(255,255,255,.08);}
  .modal-box h3{font-size:19px;margin-bottom:4px;}
  .modal-sub{color:var(--gray);font-size:12px;margin-bottom:20px;}
  .steps-track{display:flex;gap:6px;margin-bottom:24px;}
  .steps-track div{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.1);}
  .steps-track div.done{background:linear-gradient(90deg,var(--red),var(--orange));}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;color:var(--lg);margin-bottom:6px;}
  .field input,.field select{width:100%;padding:11px 14px;background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;outline:none;}
  .field input:focus{border-color:var(--orange);}
  .field.error input{border-color:var(--err);}
  .err-text{color:var(--err);font-size:10.5px;margin-top:5px;display:none;}
  .field.error .err-text{display:block;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}

  .pay-option{display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:13px 14px;margin-bottom:10px;}
  .pay-option.active{border-color:var(--orange);background:rgba(255,162,26,.06);}
  .pay-option input{accent-color:var(--orange);width:16px;height:16px;flex-shrink:0;}
  .pay-option .pinfo{flex:1;}
  .pay-option .pinfo strong{display:block;font-size:13px;}
  .pay-option .pinfo span{color:var(--gray);font-size:10.5px;}

  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .btn-ghost{flex:1;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px;font-size:13px;font-weight:600;}
  .btn-primary.flex{flex:2;text-align:center;}

  .review-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:12.5px;}
  .review-row.total strong{color:var(--orange);font-size:16px;}

  .confirm-box{text-align:center;padding:20px 0;}
  .confirm-icon{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .confirm-icon svg{width:30px;height:30px;stroke:var(--ok);}
  .order-id{font-family:'Poppins',sans-serif;color:var(--orange);font-weight:700;letter-spacing:1px;margin:10px 0 20px;}

  footer{border-top:1px solid rgba(255,255,255,.08);padding:40px 5%;margin-top:40px;color:var(--gray);font-size:12px;text-align:center;}

  @media(max-width:900px){
    .navlinks{display:none;}
    .hero{flex-direction:column;text-align:center;}
    .hero p{margin:0 auto 26px;}
    .prod-grid{grid-template-columns:repeat(2,1fr);}
    .hero-orb{width:160px;height:160px;}
  }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="logo"><div class="logo-mark"></div><span class="logo-text">VULKORA</span></div>
    <nav class="navlinks" id="navlinks"></nav>
    <div class="top-actions">
      <select class="currency-select" id="currencySelector">
        <option value="USD">USD ($)</option>
        <option value="SAR">SAR (ر.س)</option>
        <option value="AED">AED (د.إ)</option>
        <option value="EGP">EGP (ج.م)</option>
        <option value="EUR">EUR (€)</option>
        <option value="GBP">GBP (£)</option>
        <option value="IQD">IQD (د.ع)</option>
        <option value="KWD">KWD (د.ك)</option>
        <option value="JOD">JOD (د.أ)</option>
      </select>
      <div class="lang-switch" id="langSwitch">
        <button data-lang="ar">AR</button>
        <button data-lang="en">EN</button>
      </div>
      <button class="icon-btn cart-btn" id="cartBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-copy">
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroTitle"></h1>
      <p id="heroDesc"></p>
      <button class="btn-primary" id="heroBtn"></button>
    </div>
    <div class="hero-orb"></div>
  </section>

  <div class="cat-pills" id="catPills"></div>
  <h2 class="section-title" id="prodTitle"></h2>
  <div class="prod-grid" id="prodGrid"></div>
</main>

<footer id="footerText"></footer>

<!-- CART DRAWER (hidden by default) -->
<div id="cartOverlay" class="overlay hidden"></div>
<div id="cartDrawer" class="drawer hidden">
  <div class="drawer-head">
    <h3 id="cartHeadTitle"></h3>
    <button class="close-x" id="closeCart">✕</button>
  </div>
  <div class="drawer-body" id="cartBody"></div>
  <div class="drawer-foot" id="cartFoot"></div>
</div>

<!-- CHECKOUT MODAL (hidden by default) -->
<div id="checkoutModal" class="modal hidden">
  <div class="modal-box" id="checkoutBox"></div>
</div>

<!-- PRODUCT DETAIL MODAL (hidden by default) -->
<div id="productModal" class="modal hidden">
  <div class="modal-box product-box" id="productBox"></div>
</div>

<!-- ADMIN LOGIN MODAL (hidden, no visible entry point for customers) -->
<div id="adminLoginModal" class="modal hidden">
  <div class="modal-box" id="adminLoginBox" style="max-width:360px;"></div>
</div>

<!-- ADMIN PANEL MODAL (hidden, no visible entry point for customers) -->
<div id="adminPanelModal" class="modal hidden">
  <div class="modal-box admin-box" id="adminPanelBox"></div>
</div>

    const res = await fetch(`${API_BASE}/products`);
    if(!res.ok) throw new Error('bad status');
    const rows = await res.json();
    if(Array.isArray(rows) && rows.length){
      PRODUCTS = rows.map(apiProductToLocal);
      backendAvailable = true;
      renderProducts();
      renderCatPills();
    }
  } catch(err){
    // Backend not reachable (e.g. previewing this file locally without deploying the
    // Netlify Functions yet) — silently keep using the bundled demo catalog above.
    backendAvailable = false;
    console.warn('Backend unavailable, using local demo catalog:', err.message);
  }
}

/* ---------- CURRENCY (prices stored in USD, converted on display) ---------- */
let currencyState = { code: 'USD', rate: 1.0 };
const CURRENCY_RATES_FROM_USD = { USD:1.0, SAR:3.75, AED:3.67, EGP:48.50, EUR:0.92, GBP:0.78, IQD:1310, KWD:0.307, JOD:0.709 };
let ratesAreLive = false;

function formatPrice(priceInUSD){
  const converted = (priceInUSD * currencyState.rate).toFixed(2);
  return `${converted} ${currencyState.code}`;
}

function setCurrency(code){
  if(!CURRENCY_RATES_FROM_USD[code]) return;
  currencyState.code = code;
  currencyState.rate = CURRENCY_RATES_FROM_USD[code];
  const sel = document.getElementById('currencySelector');
  if(sel) sel.value = code;
  renderProducts();
  renderCartDrawer();
  if(!document.getElementById('checkoutModal').classList.contains('hidden')) renderCheckout();
  if(!document.getElementById('productModal').classList.contains('hidden')) renderProductModal();
}

/* Fetches today's live exchange rates (updated daily by the provider) and refreshes
   the currently displayed prices. Falls back to the static rates above if offline. */
function fetchLiveExchangeRates(){
  fetch('https://open.er-api.com/v6/latest/USD')
    .then(res => res.json())
    .then(data => {
      if(data && data.result === 'success' && data.rates){
        Object.keys(CURRENCY_RATES_FROM_USD).forEach(code=>{
          if(data.rates[code]) CURRENCY_RATES_FROM_USD[code] = data.rates[code];
        });
        ratesAreLive = true;
        currencyState.rate = CURRENCY_RATES_FROM_USD[currencyState.code];
        renderProducts();
        renderCartDrawer();
        if(!document.getElementById('checkoutModal').classList.contains('hidden')) renderCheckout();
        if(!document.getElementById('productModal').classList.contains('hidden')) renderProductModal();
      }
    })
    .catch(()=>{ /* offline or blocked - keep static fallback rates */ });
}

/* Detects visitor's country via IP and auto-switches currency. Fails silently offline. */
function detectLocationAndCurrency(){
  fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
      if(data && data.currency){
        const code = data.currency.toUpperCase();
        if(CURRENCY_RATES_FROM_USD[code]) setCurrency(code);
      }
    })
    .catch(()=>{ /* offline or blocked - keep default USD */ });
}

/* ---------- SECURITY: HTML escaping to prevent XSS ---------- */
/* Any string that came from a form field (admin product form, checkout fields, usernames)
   must pass through esc() before being inserted via innerHTML/template literals. */
function esc(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function renderCatPills(){

/* ---------- CART LOGIC ---------- */
function addToCart(id){
  const existing = state.cart.find(c=>c.id===id);
  if(existing) existing.qty++;
  else state.cart.push({id, qty:1});
  updateCartCount();
  renderCartDrawer();
}
function changeQty(id, delta){
  const item = state.cart.find(c=>c.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) state.cart = state.cart.filter(c=>c.id!==id);
  updateCartCount();
  renderCartDrawer();
}
function removeFromCart(id){
  state.cart = state.cart.filter(c=>c.id!==id);
  updateCartCount();
  renderCartDrawer();
}
function cartTotal(){
  return state.cart.reduce((sum,c)=>{
    const p = PRODUCTS.find(pp=>pp.id===c.id);
    return sum + (p ? p.price*c.qty : 0);
  }, 0);
}
function cartCountTotal(){
  return state.cart.reduce((s,c)=>s+c.qty,0);
}
function updateCartCount(){
  document.getElementById('cartCount').textContent = cartCountTotal();
}

function renderCartDrawer(){
  const body = document.getElementById('cartBody');
  if(state.cart.length === 0){
    body.innerHTML = `<div class="empty-cart">${t('cartEmpty')}</div>`;
    document.getElementById('cartFoot').innerHTML = '';
    return;
  }
  body.innerHTML = state.cart.map(c=>{
    const p = PRODUCTS.find(pp=>pp.id===c.id);
    return `
    <div class="cart-item">
      <div class="thumb"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[p.icon]}</svg></div>
      <div class="info">
        <h5>${esc(p.name[state.lang])}</h5>
        <div class="qty-row">
          <button data-act="dec" data-id="${p.id}">−</button>
          <span>${c.qty}</span>
          <button data-act="inc" data-id="${p.id}">+</button>
        </div>
        <button class="remove-btn" data-act="rm" data-id="${p.id}">${t('remove')}</button>
      </div>
      <div class="price">${formatPrice(p.price*c.qty)}</div>
    </div>`;
  }).join('');

  document.getElementById('cartFoot').innerHTML = `
    <div class="subtotal-row"><span>${t('subtotal')}</span><strong>${formatPrice(cartTotal())}</strong></div>
    <button class="btn-primary" style="width:100%;" id="goCheckout">${t('checkout')}</button>
  `;

  body.querySelectorAll('[data-act="inc"]').forEach(b=>b.onclick=()=>changeQty(parseInt(b.dataset.id),1));
  body.querySelectorAll('[data-act="dec"]').forEach(b=>b.onclick=()=>changeQty(parseInt(b.dataset.id),-1));
  body.querySelectorAll('[data-act="rm"]').forEach(b=>b.onclick=()=>removeFromCart(parseInt(b.dataset.id)));
  const goBtn = document.getElementById('goCheckout');
  if(goBtn) goBtn.onclick = ()=>{ closeCartDrawer(); openCheckout(); };
}

  renderCheckout();

  document.getElementById('checkoutModal').classList.add('hidden');
}

function validateShipping(){
  const f = state.shipping;
  const errs = {};
  ['fullName','email','phone','address','city','country'].forEach(k=>{
    if(!f[k] || !f[k].trim()) errs[k] = t('reqField');
  });
  if(f.email && !errs.email){
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!re.test(f.email)) errs.email = t('invalidEmail');
  }
  if(f.phone && !errs.phone){
    const digits = f.phone.replace(/\D/g,'');
    if(digits.length < 8) errs.phone = t('invalidPhone');
  }
  return errs;
}
function validateCard(){
  const c = state.card;
  const errs = {};
  const num = c.number.replace(/\s/g,'');
  if(!/^\d{16}$/.test(num)) errs.number = t('invalidCard');
  if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(c.expiry)) errs.expiry = t('invalidExpiry');
  if(!/^\d{3,4}$/.test(c.cvv)) errs.cvv = t('invalidCvv');
  return errs;
}

      if(state.payment === 'card'){
        state.card.number = document.getElementById('in-number').value;
        state.card.expiry = document.getElementById('in-expiry').value;
        state.card.cvv = document.getElementById('in-cvv').value;
        const errs = validateCard();
        document.querySelectorAll('.field').forEach(el=>el.classList.remove('error'));
        Object.keys(errs).forEach(k=>{
          const el = document.getElementById('f-'+k);
          el.classList.add('error');
          el.querySelector('.err-text').textContent = errs[k];
        });
        if(Object.keys(errs).length > 0) return;
      }
      state.checkoutStep = 2;
      renderCheckout();
    };
    return;
  }

  if(state.checkoutStep === 2){
    const shippingFee = 15;
    const total = cartTotal() + shippingFee;
    const payLabelMap = {card:t('payCard'), paypal:t('payPaypal'), moyasar:t('payMoyasar'), bnpl:t('payBnpl'), cod:t('payCod')};
    box.innerHTML = `
      <h3>${t('stepReview')}</h3>
      <p class="modal-sub">${t('checkout')}</p>
      ${trackHtml}
      <div class="review-row"><span>${t('fullName')}</span><span>${esc(state.shipping.fullName)}</span></div>
      <div class="review-row"><span>${t('address')}</span><span>${esc(state.shipping.address)}, ${esc(state.shipping.city)}</span></div>
      <div class="review-row"><span>${t('stepPay')}</span><span>${payLabelMap[state.payment]}</span></div>
      <div class="review-row"><span>${t('orderSummary')}</span><span>${cartCountTotal()} ${state.lang==='ar'?'قطعة':'items'}</span></div>
      <div class="review-row"><span>${t('subtotal')}</span><span>${formatPrice(cartTotal())}</span></div>
      <div class="review-row"><span>${t('shippingFee')}</span><span>${formatPrice(shippingFee)}</span></div>
      <div class="review-row total"><span>${t('total')}</span><strong>${formatPrice(total)}</strong></div>
      <div class="modal-actions">
        <button class="btn-ghost" id="backBtn2">${t('back')}</button>
        <button class="btn-primary flex" id="placeOrderBtn">${t('placeOrder')}</button>
      </div>
    `;
    document.getElementById('backBtn2').onclick = ()=>{ state.checkoutStep = 1; renderCheckout(); };
    document.getElementById('placeOrderBtn').onclick = async ()=>{
      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true;
      const orderPayload = {
        totalUSD: total,
        currency: currencyState.code,
        displayTotal: formatPrice(total),
        payment: state.payment,
        itemCount: cartCountTotal()
      };
      try{
        const res = await fetch(`${API_BASE}/orders`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(orderPayload)
        });
        const data = await res.json();
        state.orderId = (res.ok && data.orderId) ? data.orderId : ('VLK-' + Math.floor(100000 + Math.random()*899999));
      } catch(e){
        // offline fallback so the customer still sees a confirmation; the order just
        // won't appear in the admin Sales tab until the backend is reachable again.
        state.orderId = 'VLK-' + Math.floor(100000 + Math.random()*899999);
      }
      state.checkoutStep = 3;
      renderCheckout();
    };
    return;
  }
}

/* ---------- ADMIN PANEL (hidden from customers, no visible UI entry) ---------- */
/* Admin credentials NEVER live in this file anymore. Login is verified entirely on the
   server (see /netlify/functions/admin-login.js). This page only ever receives an
   HttpOnly session cookie it cannot read or forge — see backend/README-DEPLOY.md. */
let ORDERS_LOG = []; // local cache for rendering the Sales & Balance tab (populated from /api/orders)
let TEAM_LIST = []; // local cache for rendering the Team tab (populated from /api/team)
const ADMIN_CATS = ["electronics","fashion","home","beauty"];

function openAdminLogin(){
  if(state.isAdmin){ openAdminPanel(); return; }
  document.getElementById('adminLoginModal').classList.remove('hidden');
  renderAdminLogin(false);
}
function closeAdminLogin(){ document.getElementById('adminLoginModal').classList.add('hidden'); }

function renderAdminLogin(showError, serverMsg){
  const box = document.getElementById('adminLoginBox');
  box.innerHTML = `
    <h3>${t('adminLoginTitle')}</h3>
    <div style="height:14px;"></div>
    ${!backendAvailable ? `<div class="admin-note" style="color:var(--err);border-color:var(--err);">${state.lang==='ar' ? 'الخادم الخلفي غير متصل — لوحة الأدمن معطّلة حتى يتم نشره.' : 'Backend not connected — admin panel is disabled until it is deployed.'}</div>` : ''}
    <div class="field" id="f-adminUser"><label>${t('adminUsernameLabel')}</label><input id="in-adminUser" autocomplete="username"></div>
    <div class="field" id="f-adminPass"><label>${t('adminPasswordLabel')}</label><input type="password" id="in-adminPass" autocomplete="current-password"><div class="err-text">${serverMsg || t('adminWrongPassword')}</div></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="adminLoginCancel">${t('back')}</button>
      <button class="btn-primary flex" id="adminLoginSubmit" ${!backendAvailable?'disabled':''}>${t('adminLoginBtn')}</button>
    </div>
  `;
  if(showError){ document.getElementById('f-adminUser').classList.add('error'); document.getElementById('f-adminPass').classList.add('error'); }

  document.getElementById('adminLoginCancel').onclick = closeAdminLogin;
  document.getElementById('adminLoginSubmit').onclick = async ()=>{
    const btn = document.getElementById('adminLoginSubmit');
    const uname = document.getElementById('in-adminUser').value.trim();
    const pass = document.getElementById('in-adminPass').value;
    if(!uname || !pass) { renderAdminLogin(true); return; }
    btn.disabled = true;
    try{
      const res = await fetch(`${API_BASE}/admin-login`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'same-origin', // send/receive the HttpOnly session cookie
        body: JSON.stringify({ username: uname, password: pass })
      });
      const data = await res.json();
      if(res.ok && data.ok){
        state.isAdmin = true;
        state.adminUser = {
          username: data.account.username,
          role: data.account.role,
          name: {ar:data.account.name_ar, en:data.account.name_en}
        };
        closeAdminLogin();
        openAdminPanel();
      } else if(res.status === 429){
        const secsLeft = data.lockedUntil ? Math.max(0, Math.ceil((new Date(data.lockedUntil)-Date.now())/1000)) : 60;
        renderAdminLogin(true, state.lang==='ar' ? `محاولات كثيرة، انتظر ${secsLeft} ث` : `Too many attempts, wait ${secsLeft}s`);
      } else {
        renderAdminLogin(true);
      }
    } catch(err){
      renderAdminLogin(true, state.lang==='ar' ? 'تعذّر الاتصال بالخادم' : 'Could not reach the server');
    }
  };
  document.getElementById('in-adminPass').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') document.getElementById('adminLoginSubmit').click();
  });
}

async function openAdminPanel(){
  document.getElementById('adminPanelModal').classList.remove('hidden');
  renderAdminPanel();
  await refreshOrdersFromBackend();
  if(state.adminUser && state.adminUser.role === 'owner') await refreshTeamFromBackend();
  renderAdminPanel();
}
function closeAdminPanel(){ document.getElementById('adminPanelModal').classList.add('hidden'); }

async function adminLogout(){
  try{ await fetch(`${API_BASE}/admin-logout`, {method:'POST', credentials:'same-origin'}); } catch(e){}
  state.isAdmin = false;
  state.adminUser = null;
  state.adminTab = 'products';
  closeAdminPanel();
}

async function refreshOrdersFromBackend(){
  if(!backendAvailable) return;
  try{
    const res = await fetch(`${API_BASE}/orders`, { credentials: 'same-origin' });
    if(res.ok){
      const rows = await res.json();
      ORDERS_LOG = rows.map(o=>({
        id: o.id, totalUSD: Number(o.total_usd), currency: o.currency,
        displayTotal: o.display_total, payment: o.payment, itemCount: o.item_count,
        timestamp: o.created_at
      }));
    }
  } catch(e){ /* keep previous local cache */ }
}

async function refreshTeamFromBackend(){
  if(!backendAvailable) return;
  try{
    const res = await fetch(`${API_BASE}/team`, { credentials: 'same-origin' });
    if(res.ok) TEAM_LIST = await res.json();
  } catch(e){ /* keep previous local cache */ }
}

        <div class="field" id="f-apCountry"><label>${t('supplierCountry')}</label><input id="in-apCountry"><div class="err-text">${t('reqFieldShort')}</div></div>

      <button class="btn-primary" style="width:100%;" id="apSubmitBtn">${t('addProductBtn')}</button>

      <div style="height:22px;"></div>
      <h3 style="font-size:14px;">${t('adminProductsListTitle')}</h3>
      <div class="admin-list">
        ${adminAdded.length === 0 ? `<div class="admin-empty">${t('adminNoProducts')}</div>` :
          adminAdded.map(p=>`
            <div class="admin-list-item">
              <span>${esc(p.name[state.lang])} — ${formatPrice(p.price)} <em>(${t('addedByLabel')}: ${esc(p.addedBy || '-')})</em></span>
              <button class="admin-del-btn" data-id="${p.id}">${t('deleteBtn')}</button>
            </div>
          `).join('')}
      </div>
    `;
  } else if(state.adminTab === 'sales'){
    const orderCount = ORDERS_LOG.length;

    const avgUSD = orderCount ? (totalUSD/orderCount) : 0;
    const byMethod = {};
    ORDERS_LOG.forEach(o=>{ byMethod[o.payment] = (byMethod[o.payment]||0) + o.totalUSD; });

    contentHtml = `
      <div class="sales-cards">
        <div class="sales-card"><div class="val">${formatPrice(totalUSD)}</div><div class="lbl">${t('totalRevenue')}</div></div>
        <div class="sales-card"><div class="val">${orderCount}</div><div class="lbl">${t('totalOrders')}</div></div>
        <div class="sales-card"><div class="val">${formatPrice(avgUSD)}</div><div class="lbl">${t('avgOrder')}</div></div>
      </div>

      ${orderCount === 0 ? `<div class="admin-empty">${t('noOrdersYet')}</div>` : `
        <h3 style="font-size:13px;">${t('byPaymentMethod')}</h3>
        <div class="admin-list">
          ${Object.keys(byMethod).map(k=>`
            <div class="admin-list-item"><span>${payLabelMap[k]||k}</span><span>${formatPrice(byMethod[k])}</span></div>
          `).join('')}

        <h3 style="font-size:13px;">${t('recentOrders')}</h3>

          <div class="order-row"><span class="oid">${esc(o.id)}</span><span>${esc(o.displayTotal)} · ${payLabelMap[o.payment]||esc(o.payment)}</span></div>
        `).join('')}

      <div style="height:16px;"></div>
      <div class="admin-note"><strong>${t('withdrawalInfoTitle')}</strong><br>${t('withdrawalInfoBody')}</div>
    `;
  } else if(state.adminTab === 'team' && isOwner){
    contentHtml = `
      ${teamMsg==='exists' ? `<div class="admin-note" style="color:var(--err);border-color:var(--err);">${t('usernameTaken')}</div>` : ''}
      ${teamMsg===true ? `<div class="admin-success">${t('accountAdded')}</div>` : ''}
      <div class="field-row">
        <div class="field" id="f-newUser"><label>${t('newUsername')}</label><input id="in-newUser"><div class="err-text">${t('reqFieldShort')}</div></div>
        <div class="field" id="f-newPass"><label>${t('newPassword')}</label><input id="in-newPass"><div class="err-text">${t('reqFieldShort')}</div></div>
      </div>
      <button class="btn-ghost" style="width:100%;" id="addTeamBtn">${t('addAccountBtn')}</button>
      <div style="height:14px;"></div>
      <h3 style="font-size:13px;">${t('teamListTitle')}</h3>
      <div class="admin-list">
        ${TEAM_LIST.map(a=>`
          <div class="admin-list-item">
            <span>${esc(a.username)} — ${t(a.role==='owner'?'roleOwner':'roleAssistant')}</span>
          </div>
        `).join('')}
      </div>
      <div class="admin-note">${t('teamNote')}</div>

      ${accountMsg==='wrongpass' ? `<div class="admin-note" style="color:var(--err);border-color:var(--err);">${t('wrongCurrentPassword')}</div>` : ''}
      ${accountMsg==='taken' ? `<div class="admin-note" style="color:var(--err);border-color:var(--err);">${t('usernameTaken')}</div>` : ''}
      ${accountMsg===true ? `<div class="admin-success">${t('accountUpdated')}</div>` : ''}
      <div class="field" id="f-accCurPass"><label>${t('currentPasswordLabel')}</label><input type="password" id="in-accCurPass" autocomplete="current-password"><div class="err-text">${t('reqFieldShort')}</div></div>
      <div class="field" id="f-accNewUser"><label>${t('newUsernameOptional')}</label><input id="in-accNewUser" autocomplete="username"></div>
      <div class="field" id="f-accNewPass"><label>${t('newPasswordOptional')}</label><input type="password" id="in-accNewPass" autocomplete="new-password"><div class="err-text">${t('passwordTooShort')}</div></div>
      <button class="btn-primary" style="width:100%;" id="accSaveBtn">${t('saveAccountBtn')}</button>
      <div style="height:14px;"></div>
      <div class="admin-note">${t('accountNote')}</div>
    `;
  }

  box.innerHTML = `
    <button class="close-x-abs" id="closeAdminPanel">✕</button>
    <div class="admin-welcome">${t('welcomeAdmin')}, <strong>${me.name[state.lang]}</strong> <span class="role-badge">${t(me.role==='owner'?'roleOwner':'roleAssistant')}</span></div>
    ${tabsHtml}
    ${contentHtml}

      if(state.adminTab === 'sales') await refreshOrdersFromBackend();
      renderAdminPanel();

      document.querySelectorAll('.field').forEach(el=>el.classList.remove('error'));

        if(!uname) document.getElementById('f-newUser').classList.add('error');
        if(!pass) document.getElementById('f-newPass').classList.add('error');

      }
      if(pass.length < 8){
        document.getElementById('f-newPass').classList.add('error');

      if(TEAM_LIST.find(a=>a.username === uname)){
        renderAdminPanel(false, 'exists');

      }
      try{
        const res = await fetch(`${API_BASE}/team`, {
          method:'POST', credentials:'same-origin',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ username: uname, password: pass })
        });
        const data = await res.json().catch(()=>({}));
        if(res.ok){
          await refreshTeamFromBackend();
          renderAdminPanel(false, true);
        } else if(data.error === 'username_taken'){
          renderAdminPanel(false, 'exists');
        } else if(res.status === 401){
          state.isAdmin = false; state.adminUser = null; closeAdminPanel(); openAdminLogin();
        } else {
          renderAdminPanel(false, false);
        }
      } catch(e){ /* network error, leave form as-is */ }
    };
  }
  if(state.adminTab === 'account'){
    document.getElementById('accSaveBtn').onclick = async ()=>{
      const curPass = document.getElementById('in-accCurPass').value;
      const newUser = document.getElementById('in-accNewUser').value.trim();
      const newPass = document.getElementById('in-accNewPass').value;
      document.querySelectorAll('.field').forEach(el=>el.classList.remove('error'));

      if(!curPass){
        document.getElementById('f-accCurPass').classList.add('error');
        return;
      }
      if(newPass && newPass.length < 8){
        document.getElementById('f-accNewPass').classList.add('error');
        return;
      }
      if(!newUser && !newPass){
        // nothing to change
        return;
      }

      const btn = document.getElementById('accSaveBtn');
      btn.disabled = true;
      try{
        const body = { currentPassword: curPass };
        if(newUser) body.newUsername = newUser;
        if(newPass) body.newPassword = newPass;

        const res = await fetch(`${API_BASE}/account`, {
          method:'PUT', credentials:'same-origin',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(()=>({}));
        if(res.ok){
          if(data.account){
            state.adminUser = {
              username: data.account.username,
              role: data.account.role,
              name: {ar:data.account.name_ar, en:data.account.name_en}
            };
          } else if(newUser){
            state.adminUser.username = newUser;
          }
          if(isOwner) await refreshTeamFromBackend();
          renderAdminPanel(false, false, true);
        } else if(res.status === 401){
          if(data.error === 'wrong_password'){
            renderAdminPanel(false, false, 'wrongpass');
          } else {
            state.isAdmin = false; state.adminUser = null; closeAdminPanel(); openAdminLogin();
          }
        } else if(data.error === 'username_taken'){
          renderAdminPanel(false, false, 'taken');
        } else {
          btn.disabled = false;
        }
      } catch(e){ btn.disabled = false; }
    };
  }
  if(state.adminTab === 'products'){
    document.getElementById('apSubmitBtn').onclick = async ()=>{
      const nameAr = document.getElementById('in-apNameAr').value.trim();
      const nameEn = document.getElementById('in-apNameEn').value.trim();
      const price = parseFloat(document.getElementById('in-apPrice').value);
      const company = document.getElementById('in-apCompany').value.trim();
      const country = document.getElementById('in-apCountry').value.trim();

      const errs = {};
      if(!nameAr) errs.apNameAr = 1;
      if(!nameEn) errs.apNameEn = 1;
      if(!price || price <= 0) errs.apPrice = 1;
      if(!company) errs.apCompany = 1;
      if(!country) errs.apCountry = 1;
      document.querySelectorAll('.field').forEach(el=>el.classList.remove('error'));
      Object.keys(errs).forEach(k=>{ const el = document.getElementById('f-'+k); if(el) el.classList.add('error'); });
      if(Object.keys(errs).length > 0) return;

      const descAr = document.getElementById('in-apDescAr').value.trim() || nameAr;
      const descEn = document.getElementById('in-apDescEn').value.trim() || nameEn;
      const material = document.getElementById('in-apMaterial').value.trim() || '-';
      const shipping = document.getElementById('in-apShipping').value.trim() || (state.lang==='ar' ? 'يحدد لاحقاً' : 'TBD');
      const cat = document.getElementById('in-apCat').value;
      const icon = document.getElementById('in-apIcon').value;

      const submitBtn = document.getElementById('apSubmitBtn');
      submitBtn.disabled = true;
      try{
        const res = await fetch(`${API_BASE}/products`, {
          method:'POST', credentials:'same-origin',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            cat, price, icon,
            name_ar: nameAr, name_en: nameEn,
            desc_ar: descAr, desc_en: descEn,
            material_ar: material, material_en: material,
            origin_ar: `${company} - ${country}`, origin_en: `${company} - ${country}`,
            shipping_ar: `${shipping} ${state.lang==='ar'?'يوم عمل':'business days'}`, shipping_en: `${shipping} business days`
          })
        });
        if(res.ok){
          await loadProductsFromBackend();
          renderCatPills();
          renderAdminPanel(true);
        } else if(res.status === 401){
          state.isAdmin = false; state.adminUser = null; closeAdminPanel(); openAdminLogin();
        } else {
          submitBtn.disabled = false;
        }
      } catch(e){ submitBtn.disabled = false; }
    };
  }
}

document.querySelector('.logo').addEventListener('click', ()=>{

  clearTimeout(logoClickTimer);

    openAdminLogin();

});
